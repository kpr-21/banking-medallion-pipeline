services:

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile-airflow
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate &&
          airflow users create
          --username admin
          --password admin
          --firstname admin
          --lastname admin
          --role Admin
          --email admin@example.com"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts       
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
      - ./airflow_db:/opt/airflow
    environment:
      - AIRFLOW__CORE__FERNET_KEY=LOzHQhniYPu6cvgGwDy-9SNbAuzQn_yKqYoZqcp5CHg=

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile-airflow
    container_name: airflow-webserver
    restart: always
    depends_on:
      - airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__FERNET_KEY=LOzHQhniYPu6cvgGwDy-9SNbAuzQn_yKqYoZqcp5CHg=
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts        
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
      - ./airflow_db:/opt/airflow
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile-airflow
    container_name: airflow-scheduler
    restart: always
    depends_on:
      - airflow-webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__FERNET_KEY=LOzHQhniYPu6cvgGwDy-9SNbAuzQn_yKqYoZqcp5CHg=
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts        
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
      - ./airflow_db:/opt/airflow
    command: scheduler